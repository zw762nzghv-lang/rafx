<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b12"/>
      <stop offset="100%" stop-color="#0c0b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#d4f03c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4f03c" stop-opacity="0"/>
    </radialGradient>
    <filter id="xglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Arka plan -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Izgara deseni -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ede7d9" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ede7d9" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ede7d9" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ede7d9" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Glow -->
  <ellipse cx="600" cy="340" rx="420" ry="260" fill="url(#glow)"/>

  <!-- Kenarlık -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ede7d9" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Sol raf çizgileri -->
  <rect x="60" y="180" width="180" height="6" rx="3" fill="#d4f03c" opacity="0.25"/>
  <rect x="60" y="210" width="120" height="4" rx="2" fill="#ede7d9" opacity="0.08"/>
  <rect x="60" y="290" width="200" height="6" rx="3" fill="#d4f03c" opacity="0.15"/>
  <rect x="60" y="320" width="140" height="4" rx="2" fill="#ede7d9" opacity="0.08"/>
  <rect x="60" y="400" width="160" height="6" rx="3" fill="#d4f03c" opacity="0.2"/>
  <rect x="60" y="430" width="100" height="4" rx="2" fill="#ede7d9" opacity="0.06"/>

  <!-- Sağ raf çizgileri -->
  <rect x="960" y="200" width="180" height="6" rx="3" fill="#d4f03c" opacity="0.2"/>
  <rect x="1000" y="230" width="120" height="4" rx="2" fill="#ede7d9" opacity="0.08"/>
  <rect x="940" y="310" width="200" height="6" rx="3" fill="#d4f03c" opacity="0.15"/>
  <rect x="980" y="340" width="140" height="4" rx="2" fill="#ede7d9" opacity="0.08"/>
  <rect x="960" y="420" width="160" height="6" rx="3" fill="#d4f03c" opacity="0.25"/>

  <!-- Ana logo: RAF -->
  <text
    font-family="Arial Black, Arial Bold, Helvetica, sans-serif"
    font-weight="900"
    font-size="200"
    text-anchor="middle"
    x="600" y="345"
    fill="#ede7d9"
    filter="url(#shadow)">RAF<tspan fill="#d4f03c" filter="url(#xglow)">x</tspan></text>

  <!-- Tagline -->
  <text
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="34"
    letter-spacing="8"
    text-anchor="middle"
    x="600" y="430"
    fill="#ede7d9"
    opacity="0.45">CARPIM BULMACASI</text>

  <!-- Alt çizgi -->
  <rect x="500" y="455" width="200" height="3" rx="1.5" fill="#d4f03c" opacity="0.5"/>

  <!-- Mod etiketleri -->
  <rect x="330" y="505" width="150" height="40" rx="8" fill="#d4f03c" opacity="0.1"/>
  <text font-family="Arial, sans-serif" font-size="18" text-anchor="middle" x="405" y="530" fill="#d4f03c" opacity="0.85">Normal</text>

  <rect x="505" y="505" width="190" height="40" rx="8" fill="#d4f03c" opacity="0.1"/>
  <text font-family="Arial, sans-serif" font-size="18" text-anchor="middle" x="600" y="530" fill="#d4f03c" opacity="0.85">Sure Siniri</text>

  <rect x="720" y="505" width="150" height="40" rx="8" fill="#d4f03c" opacity="0.1"/>
  <text font-family="Arial, sans-serif" font-size="18" text-anchor="middle" x="795" y="530" fill="#d4f03c" opacity="0.85">Sonsuz</text>
</svg>
